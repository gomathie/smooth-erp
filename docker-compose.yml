version: "3.8"

services:

  app:
    build: .
    container_name: erp_app
    ports:
      - "8080:80"
    volumes:
      # Mount the whole project (document root = project root, harden-in-place).
      - ./:/var/www/html
      # Keep container-managed storage from being shadowed if you prefer a volume:
      # - app_storage:/var/www/html/storage
    depends_on:
      - db
    # NOTE: when running under Docker, set DB_HOST=db in config/.env
    #       (the XAMPP value is localhost). The app reads config/.env.

  db:
    image: mysql:8.0
    container_name: erp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: posystem
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-load the schema on first boot of an empty database:
      - ./database/smootherp.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: erp_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:
