services:

  # Default stack connects to Supabase (PostgreSQL) — credentials come from
  # config/.env (DB_CONNECTION=pgsql, session pooler host on port 5432).
  # The app no longer depends on a local DB. To run fully local on MySQL
  # instead, start with the "local" profile: `docker compose --profile local up`
  # and set config/.env back to DB_CONNECTION=mysql, DB_HOST=db.
  app:
    build: .
    container_name: erp_app
    ports:
      - "8080:80"
    volumes:
      # Mount the whole project (document root = project root, harden-in-place).
      - ./:/var/www/html
      # Keep container-managed storage from being shadowed if you prefer a volume:
      # - app_storage:/var/www/html/storage

  # --- Local MySQL stack (opt-in, NOT started by default) -------------------
  db:
    image: mysql:8.0
    container_name: erp_db
    profiles: ["local"]
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: posystem
      MYSQL_USER: erp_user
      MYSQL_PASSWORD: erp_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      # Auto-load the schema on first boot of an empty database:
      - ./database/smootherp.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: erp_phpmyadmin
    profiles: ["local"]
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:
